apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fingerprint-ingestor.fullname" . }}
  labels:
    {{- include "fingerprint-ingestor.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.secrets.KAFKA_API_KEY }}
  KAFKA_API_KEY: {{ .Values.secrets.KAFKA_API_KEY | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.KAFKA_API_SECRET }}
  KAFKA_API_SECRET: {{ .Values.secrets.KAFKA_API_SECRET | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.SERVICE_AUTH_TOKEN }}
  SERVICE_AUTH_TOKEN: {{ .Values.secrets.SERVICE_AUTH_TOKEN | b64enc | quote }}
  {{- end }}
