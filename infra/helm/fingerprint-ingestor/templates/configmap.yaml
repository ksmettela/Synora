apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fingerprint-ingestor.fullname" . }}
  labels:
    {{- include "fingerprint-ingestor.labels" . | nindent 4 }}
data:
  {{- toYaml .Values.env | nindent 2 }}
  KAFKA_BOOTSTRAP_SERVERS: {{ .Values.kafka.bootstrapServers | quote }}
  KAFKA_TOPIC: {{ .Values.kafka.topic | quote }}
  KAFKA_CONSUMER_GROUP: {{ .Values.kafka.consumerGroup | quote }}
  KAFKA_PARTITIONS: {{ .Values.kafka.partitions | quote }}
  REDIS_URL: {{ .Values.redis.url | quote }}
  REDIS_TTL: {{ .Values.redis.ttl | quote }}
