version: "3.8"

services:
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    healthcheck:
      test: kafka-broker-api-versions.sh --bootstrap-server localhost:9092
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_SYNC_LIMIT: 5
      ZOOKEEPER_INIT_LIMIT: 5
    ports:
      - "2181:2181"

  fingerprint-indexer:
    build:
      context: ../fingerprint-indexer
      dockerfile: Dockerfile
    container_name: fingerprint-indexer
    ports:
      - "8080:8080"
    environment:
      RUST_LOG: fingerprint_indexer=info
      SCYLLA_HOSTS: scylla:9042
      KAFKA_BOOTSTRAP: kafka:9092
      HTTP_PORT: "8080"
      REPLICATION_FACTOR: "1"
    depends_on:
      kafka:
        condition: service_healthy
      scylla:
        condition: service_healthy
    healthcheck:
      test: curl -f http://localhost:8080/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 3

  scylla:
    image: scylladb/scylla:5.2.0
    container_name: scylla
    ports:
      - "9042:9042"
      - "10000:10000"
    environment:
      SCYLLA_SEEDS: scylla
      SCYLLA_LISTEN_ADDRESS: 0.0.0.0
    volumes:
      - scylla_data:/var/lib/scylla
    healthcheck:
      test: nodetool status || exit 1
      interval: 15s
      timeout: 10s
      retries: 10

  matching-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: matching-engine
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      FINGERPRINT_SERVICE_URL: http://fingerprint-indexer:8080
      PYTHONUNBUFFERED: "1"
    depends_on:
      kafka:
        condition: service_healthy
      fingerprint-indexer:
        condition: service_healthy
    ports:
      - "6066:6066"
    volumes:
      - ./:/app
    command: python -m faust -A app worker -l info

volumes:
  scylla_data:
    driver: local
