apiVersion: apps/v1
kind: Deployment
metadata:
  name: matching-engine
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: matching-engine
  template:
    metadata:
      labels:
        app: matching-engine
    spec:
      containers:
      - name: matching-engine
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
