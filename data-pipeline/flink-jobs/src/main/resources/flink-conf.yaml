jobmanager.rpc.address: localhost
jobmanager.rpc.port: 6123
jobmanager.memory.process.size: 1600m
taskmanager.memory.process.size: 1728m
taskmanager.numberOfTaskSlots: 8
parallelism.default: 4

# State backend configuration
state.backend: rocksdb
state.backend.rocksdb.checkpoints.dir: file:///flink/checkpoints
state.checkpoints.dir: file:///flink/checkpoints
state.savepoints.dir: file:///flink/savepoints

# Checkpoint configuration
execution.checkpointing.interval: 60000
execution.checkpointing.mode: EXACTLY_ONCE
execution.checkpointing.timeout: 600000
execution.checkpointing.min-pause: 30000

# Network tuning
taskmanager.network.detailed-metrics: false
taskmanager.network.netty.num-arenas: 4

# Memory tuning
taskmanager.memory.managed.size: 512mb

# Logging
logger.org.apache.iceberg.level: INFO
logger.org.apache.kafka.level: INFO
