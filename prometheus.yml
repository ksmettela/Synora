global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'acraas-local'
    environment: 'development'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alert.rules"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'fingerprint-ingestor'
    static_configs:
      - targets: ['fingerprint-ingestor:8080']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'matching-engine'
    static_configs:
      - targets: ['matching-engine:8081']
    metrics_path: '/metrics'

  - job_name: 'fingerprint-indexer'
    static_configs:
      - targets: ['fingerprint-indexer:8082']
    metrics_path: '/metrics'

  - job_name: 'segmentation-engine'
    static_configs:
      - targets: ['segmentation-engine:8083']
    metrics_path: '/metrics'

  - job_name: 'advertiser-api'
    static_configs:
      - targets: ['advertiser-api:8084']
    metrics_path: '/metrics'

  - job_name: 'privacy-service'
    static_configs:
      - targets: ['privacy-service:8085']
    metrics_path: '/metrics'

  - job_name: 'billing-service'
    static_configs:
      - targets: ['billing-service:8086']
    metrics_path: '/metrics'

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9101']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
    metrics_path: '/metrics'
